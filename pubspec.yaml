name: gerakpulih_flutter
description: GerakPulih — Asisten Fisioterapi Mandiri Pasca-Stroke
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigasi
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # AI Pose Detection
  google_mlkit_pose_detection: ^0.11.0
  camera: ^0.10.5+9

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Penyimpanan Lokal
  shared_preferences: ^2.2.3

  # Animasi
  flutter_animate: ^4.5.0

  # UI
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
